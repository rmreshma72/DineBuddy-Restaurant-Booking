{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
<!-- Restaurant List -->
    <div class="row">

        {% for restaurant in restaurants %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                <img src="{{ restaurant.image.url }}" class="card-img-top" height="200">
                <div class="card-body">
                    <h5 class="card-title">{{ restaurant.name }}</h5>
                    <p class="card-text">
                        {{ restaurant.cuisine }} <br>
                        📍 {{ restaurant.location }}
                    </p>
                    <a href="{% url 'restaurant_detail' restaurant.id %}" 
                    class="btn btn-primary">
                    View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
