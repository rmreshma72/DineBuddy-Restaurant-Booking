{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3>Edit Menu Item</h3>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
{{form.name}}
</div>

<div class="mb-3">
<label>Description</label>
{{ form.description }}
</div>

<div class="mb-3">
<label>Category</label>
{{ form.category }}
</div>

<div class="mb-3">
<label>Price</label>
{{form.price}}
</div>

<div class="mb-3">
<label>Menu Image</label>
{{ form.image }}
</div>

<button type="submit" class="btn btn-success">Update</button>

</form>

</div>

{% endblock %}
