{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3>Manage Tables</h3>

<a href="{% url 'add_table' %}" class="btn btn-primary mb-3">
Add Table
</a>

<table class="table table-bordered">

<tr>
<th>Restaurant</th>
<th>Table No</th>
<th>Capacity</th>
</tr>

{% for table in tables %}

<tr>

<td>{{ table.restaurant.name }}</td>
<td>{{ table.table_number }}</td>
<td>{{ table.capacity }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
