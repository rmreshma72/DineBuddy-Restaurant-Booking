{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">


<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-body">

                <h3 class="text-center mb-4">Add Restaurant</h3>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Restaurant Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Location</label>
                        <input type="text" name="location" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Cuisine</label>
                        <input type="text" name="cuisine" class="form-control" placeholder="Indian, Chinese, Italian..." required>
                    </div>

                    <div class="mb-3">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Opening Time</label>
                        <input type="time" name="opening_time" class="form-control" required>
                        </div>

                        <div class="mb-3">
                        <label>Closing Time</label>
                        <input type="time" name="closing_time" class="form-control" required>
                        </div>

                    <div class="mb-3">
                        <label>Restaurant Image</label>
                        <input type="file" name="image" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Add Restaurant
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
