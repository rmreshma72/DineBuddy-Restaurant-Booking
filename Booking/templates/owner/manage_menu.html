{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3>Manage Menu</h3>

<a href="{% url 'add_menu' %}" class="btn btn-success mb-3">
Add Menu Item
</a>

<table class="table table-bordered">

<tr>
<th>Restaurant</th>
<th>Name</th>
<th>Description</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for menu in menus %}

<tr>

<td>{{ menu.restaurant.name }}</td>
<td>{{ menu.name }}</td>
<td>{{ menu.description }}</td>
<td>₹ {{ menu.price }}</td>

<td>

<a href="{% url 'edit_menu' menu.id %}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="{% url 'delete_menu' menu.id %}" 
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this item?');">
Delete </a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
