{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3>Manage Time Slots</h3>

<a href="{% url 'add_timeslot' %}" class="btn btn-primary mb-3">
Add Time Slot
</a>

<table class="table table-bordered">

<tr>

<th>Meal Type</th>
<th>Time</th>

</tr>

{% for slot in timeslots %}

<tr>

<td>{{ slot.meal_type }}</td>
<td>{{ slot.time }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
